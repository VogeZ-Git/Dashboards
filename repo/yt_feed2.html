<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feed</title>
<style>
  :root{
    --bg:#14161a; --panel:#1b1e24; --panel-2:#22262e; --line:#2b303a;
    --ink:#e7e9ee; --ink-dim:#9aa2b1; --ink-faint:#6b7280;
    --accent:#e0a44a; --accent-dim:#8a6a30; --new:#4ec9a8;
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px}
  a{color:inherit;text-decoration:none}
  a:hover{text-decoration:underline}

  header{
    position:sticky;top:0;z-index:5;background:var(--bg);
    border-bottom:1px solid var(--line);padding:14px 20px 12px;
  }
  .titlerow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:15px;font-weight:600;letter-spacing:.02em}
  h1 .dot{color:var(--accent)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .controls{display:flex;gap:10px;margin-top:11px;flex-wrap:wrap;align-items:center}
  #q{
    flex:1 1 240px;min-width:180px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);border-radius:7px;padding:7px 11px;font-size:13px;outline:none;
  }
  #q:focus{border-color:var(--accent-dim)}
  select{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:7px 9px;font-size:12px;outline:none;cursor:pointer;
  }
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-dim);
       font-family:var(--mono);cursor:pointer;user-select:none;white-space:nowrap}
  .chk input{accent-color:var(--accent);cursor:pointer}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
       border-radius:7px;padding:7px 11px;font-size:12px;font-family:var(--mono);
       cursor:pointer;white-space:nowrap;transition:.12s}
  .btn:hover{border-color:var(--accent-dim);color:var(--ink)}
  .banner{margin-top:11px;padding:8px 12px;border:1px solid var(--accent-dim);
          background:rgba(224,164,74,.08);color:var(--accent);border-radius:7px;
          font-family:var(--mono);font-size:12px;line-height:1.5}
  .banner code{color:var(--ink)}
  .act{width:1%;white-space:nowrap;text-align:right;padding-right:16px}
  .mark{background:transparent;border:1px solid var(--line);color:var(--ink-faint);
        border-radius:6px;padding:4px 8px;font-size:11px;font-family:var(--mono);
        cursor:pointer;transition:.12s;white-space:nowrap}
  .mark:hover{border-color:var(--new);color:var(--new)}
  tr.watched{opacity:.42}
  tr.watched:hover{opacity:.72}
  tr.watched .mark{border-color:var(--accent-dim);color:var(--accent)}
  .main{display:flex;align-items:flex-start;gap:0}
  .side{flex:0 0 194px;padding:14px 8px 20px 20px;box-sizing:border-box}
  .content{flex:1 1 auto;min-width:0}
  .chips{display:flex;flex-direction:column;gap:3px;align-items:stretch}
  .chip{
    font-family:var(--mono);font-size:11.5px;padding:5px 10px;border-radius:6px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);cursor:pointer;
    user-select:none;transition:.12s;display:flex;justify-content:space-between;
    align-items:center;gap:8px;
  }
  .chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .n{opacity:.65;flex:0 0 auto}
  .chip:hover{border-color:var(--accent-dim);color:var(--ink)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#14161a;font-weight:600}
  .chip.on .n{opacity:.85}
  .chip.zero{opacity:.4}

  table{border-collapse:collapse;width:100%}
  thead th{
    position:sticky;top:0;background:var(--panel-2);text-align:left;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-dim);font-weight:600;padding:9px 14px;border-bottom:1px solid var(--line);
    cursor:pointer;user-select:none;white-space:nowrap;
  }
  thead th.nosort{cursor:default}
  thead th .ar{color:var(--accent);margin-left:5px;font-size:10px}
  tbody tr{border-bottom:1px solid var(--line)}
  tbody tr:hover{background:var(--panel)}
  td{padding:9px 14px;vertical-align:middle}
  .thumb{width:120px;padding:6px 0 6px 14px}
  .thumbwrap{display:block}
  .thumb img{display:block;width:120px;height:67px;object-fit:cover;border-radius:5px;background:var(--panel-2)}
  .title{max-width:640px;line-height:1.35}
  .title a{font-weight:500}
  .title .badge{
    font-family:var(--mono);font-size:9px;color:#14161a;background:var(--new);
    padding:1px 5px;border-radius:4px;margin-left:8px;vertical-align:middle;font-weight:700;
  }
  .chan{color:var(--ink-dim);white-space:nowrap}
  .when{font-family:var(--mono);font-size:12px;color:var(--ink-dim);white-space:nowrap}
  .when .abs{color:var(--ink-faint);font-size:10.5px}
  .views{font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-align:right;white-space:nowrap}
  .empty{padding:60px 20px;text-align:center;color:var(--ink-faint)}
  footer{padding:16px 20px;color:var(--ink-faint);font-family:var(--mono);font-size:11px}
  @media(max-width:720px){
    .thumb,.views{display:none}
    .title{max-width:none}
    .main{flex-direction:column}
    .side{flex-basis:auto;width:100%;padding:10px 16px 4px 16px}
    .chips{flex-direction:row;flex-wrap:wrap;gap:6px}
    .chip{border-radius:20px}
    .chip .nm{max-width:none}
  }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>feed<span class="dot">.</span></h1>
    <span class="meta">2534 videos &middot; built 2026-07-23 10:35</span>
  </div>
  <div class="controls">
    <input id="q" type="search" placeholder="Filter by title or channel...">
    <select id="age">
      <option value="0">any time</option>
      <option value="1">past 24h</option>
      <option value="7">past week</option>
      <option value="30">past month</option>
    </select>
    <label class="chk"><input type="checkbox" id="showWatched"> Show watched</label>
    <button id="markVis" class="btn" title="Mark every currently-visible video as watched">Mark visible watched</button>
    <span class="meta" id="shown"></span>
  </div>
  <div id="banner" class="banner" style="display:none"></div>
</header>

<div class="main">
  <aside class="side"><div class="chips" id="chips"></div></aside>
  <div class="content">
    <table>
      <thead>
        <tr>
          <th class="nosort thumb"></th>
          <th data-k="channel">Channel</th>
          <th data-k="title">Title</th>
          <th data-k="published">Published</th>
          <th data-k="views" style="text-align:right">Views</th>
          <th class="nosort act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No videos match.</div>
  </div>
</div>
<footer>RSS-backed &middot; watched list + settings sync to your Apps Script endpoint &middot; history accumulates across runs</footer>

const NOW = Date.now();
let sortKey = "published", sortDir = -1;
const activeChans = new Set();
let WATCHED = {};        // {videoId: iso-timestamp}
let connected = false;   // is the sync endpoint reachable?

/* ---- sync layer (talks to the Apps Script web app) ----
   NOTE ON CORS: we POST with the DEFAULT content-type (text/plain) and set no
   custom headers, so the browser sends a *simple* request with no preflight.
   Apps Script web apps cannot answer an OPTIONS preflight, so adding
   Content-Type: application/json here would silently break every write. */
const SYNC_URL    = "https://script.google.com/macros/s/AKfycbyjSJaV10tFmTVO9NoWvVuWMQMiNwvB6aZVOxc_ZJJFm_f1c1BkpttmvXWlIpkDlP2kBw/exec";
const SYNC_SECRET = "";

async function api(payload){
  const body = JSON.stringify(Object.assign({secret: SYNC_SECRET}, payload));
  const r = await fetch(SYNC_URL, {method:"POST", body, redirect:"follow"});
  if(!r.ok) throw new Error("http "+r.status);
  const s = await r.json();
  if(s && s.error) throw new Error(s.error);
  return s;
}
async function loadState(){
  if(!SYNC_URL){ connected=false; showBanner("nourl"); return; }
  let s;
  try{
    s = await api({action:"load"});
  }catch(e){ connected=false; showBanner("err"); return; }
  connected = true;                       // we reached it -- this is the only network truth
  WATCHED = s.watched || {};
  try{ applySettings(s.settings || {}); }
  catch(e){ console.warn("settings apply failed (non-fatal):", e); }
}
function applySettings(st){
  if("showWatched" in st) document.getElementById("showWatched").checked = !!st.showWatched;
  if("age" in st) document.getElementById("age").value = String(st.age);
  if(st.sortKey){ sortKey = st.sortKey; sortDir = st.sortDir || -1; }
  activeChans.clear();
  (st.channels || []).forEach(c => activeChans.add(c));
}
let _saveT = null;
function saveSettings(){
  if(!connected) return;
  clearTimeout(_saveT);
  _saveT = setTimeout(()=>{
    const settings = {
      showWatched: document.getElementById("showWatched").checked,
      age:         parseInt(document.getElementById("age").value,10),
      sortKey, sortDir,
      channels:    [...activeChans],
    };
    api({action:"settings", settings}).catch(()=>{ connected=false; showBanner("err"); });
  }, 400);
}
/* ---- write queue: coalesce rapid marks into serial bulk writes ----
   Instead of one request per click (which floods Apps Script with concurrent
   redirected POSTs and trips its script lock), we update the UI instantly,
   collect changed ids, and flush them as a single bulk write per burst. Flushes
   never overlap, and a failed flush retries quietly -- it does NOT tear down the
   session, so one hiccup can't block further marking. */
const _dirty = new Set();     // ids whose server state may lag the UI
let _flushT = null, _flushing = false, _fails = 0;

function queueMark(id){
  _dirty.add(id);
  clearTimeout(_flushT);
  _flushT = setTimeout(flush, 350);
}
async function flush(){
  if(_flushing || !SYNC_URL || _dirty.size === 0) return;
  _flushing = true;
  const batch = [..._dirty];
  _dirty.clear();                                  // will re-add on failure
  const add = batch.filter(id => WATCHED[id]);
  const rem = batch.filter(id => !WATCHED[id]);
  try{
    if(add.length) await api({action:"watch_bulk", ids:add, watched:true});
    if(rem.length) await api({action:"watch_bulk", ids:rem, watched:false});
    _fails = 0;
    connected = true;
    hideBanner();
  }catch(e){
    batch.forEach(id => _dirty.add(id));           // requeue; keep optimistic UI
    _fails++;
    if(_fails >= 3) showBanner("saving");          // soft warning, non-blocking
  }finally{
    _flushing = false;
    if(_dirty.size){                                // more pending or a retry
      clearTimeout(_flushT);
      _flushT = setTimeout(flush, _fails ? 1500 : 350);   // back off on failure
    }
  }
}

function setWatched(id, watched){
  if(!SYNC_URL){ showBanner("nourl"); return; }
  if(watched) WATCHED[id] = new Date().toISOString(); else delete WATCHED[id];
  render(); buildChips();   // instant, optimistic (updates rail counts too)
  queueMark(id);            // batched, serialized, resilient
}
function markVisibleWatched(){
  if(!SYNC_URL){ showBanner("nourl"); return; }
  const ids = currentRows().filter(r => !WATCHED[r.id]).map(r => r.id);
  if(!ids.length) return;
  const ts = new Date().toISOString();
  ids.forEach(id => { WATCHED[id] = ts; _dirty.add(id); });
  render(); buildChips();
  clearTimeout(_flushT); _flushT = setTimeout(flush, 100);
}
function hideBanner(){ document.getElementById("banner").style.display = "none"; }
function showBanner(kind){
  const b = document.getElementById("banner");
  b.innerHTML =
    (kind === "nourl")
      ? "No sync endpoint set \u2014 watched list &amp; settings are off. Put your Apps "
        + "Script <code>/exec</code> URL in <code>SYNC_URL</code> in yt_feed.py and regenerate."
    : (kind === "saving")
      ? "Some changes haven't saved yet \u2014 retrying. Your marks are kept; just don't close the tab."
      : "Can't reach the sync endpoint \u2014 watched list &amp; settings are off "
        + "(you're offline, or the Apps Script URL is wrong / not deployed for 'Anyone').";
  b.style.display = "block";
}

/* ---- formatting ---- */
function rel(iso){
  const t = Date.parse(iso); if(isNaN(t)) return "";
  const s = Math.floor((NOW - t)/1000);
  if(s < 60)      return "just now";
  const m = Math.floor(s/60);   if(m < 60) return m+"m ago";
  const h = Math.floor(m/60);   if(h < 24) return h+"h ago";
  const d = Math.floor(h/24);   if(d < 7)  return d+"d ago";
  const w = Math.floor(d/7);    if(w < 5)  return w+"w ago";
  const mo= Math.floor(d/30);   if(mo< 12) return mo+"mo ago";
  return Math.floor(d/365)+"y ago";
}
function absDate(iso){
  const dd = new Date(iso); if(isNaN(dd)) return "";
  return dd.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
}
function fmtViews(v){
  if(v==null) return "";
  if(v>=1e6) return (v/1e6).toFixed(v>=1e7?0:1)+"M";
  if(v>=1e3) return (v/1e3).toFixed(v>=1e4?0:1)+"k";
  return ""+v;
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---- channel rail ---- */
function buildChips(){
  const counts = {};                         // unwatched count per channel
  DATA.forEach(r => { counts[r.channel] = (counts[r.channel]||0) + (WATCHED[r.id] ? 0 : 1); });
  const names = Object.keys(counts).sort((a,b)=>
    a.toLowerCase() < b.toLowerCase() ? -1 : a.toLowerCase() > b.toLowerCase() ? 1 : 0);
  const box = document.getElementById("chips");
  box.innerHTML = "";
  names.forEach(name=>{
    const el = document.createElement("div");
    el.className = "chip"
      + (activeChans.has(name) ? " on" : "")
      + (counts[name] === 0 ? " zero" : "");
    const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = name;
    const n  = document.createElement("span"); n.className  = "n";  n.textContent  = counts[name];
    el.appendChild(nm); el.appendChild(n);
    el.onclick = ()=>{
      if(activeChans.has(name)){activeChans.delete(name);el.classList.remove("on");}
      else{activeChans.add(name);el.classList.add("on");}
      render(); saveSettings();
    };
    box.appendChild(el);
  });
}

/* ---- filtering + sorting ---- */
function currentRows(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const ageDays = parseInt(document.getElementById("age").value,10);
  const cutoff = ageDays ? NOW - ageDays*864e5 : 0;
  const showWatched = document.getElementById("showWatched").checked;
  let rows = DATA.filter(r=>{
    if(activeChans.size && !activeChans.has(r.channel)) return false;
    if(!showWatched && WATCHED[r.id]) return false;
    if(cutoff && Date.parse(r.published) < cutoff) return false;
    if(q){
      const hay = (r.title+" "+r.channel).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==="views"){x=x??-1;y=y??-1;return (x-y)*sortDir;}
    x=(x||"").toString().toLowerCase(); y=(y||"").toString().toLowerCase();
    return x<y?-sortDir : x>y?sortDir : 0;
  });
  return rows;
}

/* ---- render ---- */
function render(){
  const rows = currentRows();
  const tb = document.getElementById("rows");
  tb.innerHTML = rows.map(r=>{
    const fresh = (NOW - Date.parse(r.published)) < 2*864e5;
    const seen = !!WATCHED[r.id];
    return `<tr class="${seen?'watched':''}">
      <td class="thumb"><a class="thumbwrap" href="${r.url}" target="_blank" rel="noopener">
        <img loading="lazy" src="${r.thumb}" alt=""></a></td>
      <td class="chan">${esc(r.channel)}</td>
      <td class="title"><a href="${r.url}" target="_blank" rel="noopener">${esc(r.title)}</a>${
        fresh && !seen ? '<span class="badge">NEW</span>' : ''}</td>
      <td class="when">${rel(r.published)}<br><span class="abs">${absDate(r.published)}</span></td>
      <td class="views">${fmtViews(r.views)}</td>
      <td class="act"><button class="mark" onclick="setWatched('${r.id}',${seen?'false':'true'})">${
        seen ? 'unmark' : '\u2713 watched'}</button></td>
    </tr>`;
  }).join("");
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  document.getElementById("shown").textContent =
    rows.length===DATA.length ? "" : "showing "+rows.length;
  document.querySelectorAll("thead th[data-k]").forEach(th=>{
    const ar = th.dataset.k===sortKey ? (sortDir<0?" \u25be":" \u25b4") : "";
    th.innerHTML = th.textContent.replace(/[\u25be\u25b4]/g,"").trim()
      + (ar ? `<span class="ar">${ar}</span>` : "");
  });
}

/* ---- events ---- */
document.querySelectorAll("thead th[data-k]").forEach(th=>{
  th.onclick = ()=>{
    const k = th.dataset.k;
    if(k===sortKey) sortDir *= -1;
    else { sortKey = k; sortDir = (k==="published"||k==="views") ? -1 : 1; }
    render(); saveSettings();
  };
});
document.getElementById("q").addEventListener("input", render);
document.getElementById("age").addEventListener("change", ()=>{ render(); saveSettings(); });
document.getElementById("showWatched").addEventListener("change", ()=>{ render(); saveSettings(); });
document.getElementById("markVis").addEventListener("click", markVisibleWatched);

/* ---- init: load synced state first, then paint ---- */
(async function init(){
  await loadState();
  buildChips();
  render();
})();
</script>
</body>
